apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: development
  labels:
    app: valkey-cluster
spec:
  serviceName: valkey-headless
  replicas: 2
  selector:
    matchLabels:
      app: valkey-cluster
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  template:
    metadata:
      labels:
        app: valkey-cluster
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: valkey-cluster
      containers:
        - name: valkey
          image: valkey/valkey:9.0.4-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -e
              exec valkey-server /etc/valkey/valkey.conf \
                --cluster-announce-hostname "$(hostname).valkey-headless.${NAMESPACE}.svc.cluster.local" \
                --cluster-preferred-endpoint-type hostname
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 6379
              name: client
            - containerPort: 16379
              name: gossip
          volumeMounts:
            - name: config
              mountPath: /etc/valkey
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  valkey-cli ping | grep -q PONG || exit 1
                  ROLE=$(valkey-cli info replication | grep -m1 '^role:' | cut -d: -f2 | tr -d '\r')
                  if [ "$ROLE" = "slave" ]; then
                    valkey-cli info replication | grep -q '^master_link_status:up' || exit 1
                  fi
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: valkey-cluster-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
